<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="nucleusGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a8edea"/>
      <stop offset="100%" stop-color="#4fc3f7"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Orbit 1 -->
  <ellipse cx="100" cy="100" rx="85" ry="30"
    fill="none" stroke="#4fc3f7" stroke-width="2" opacity="0.8"
    transform="rotate(0, 100, 100)" filter="url(#glow)"/>

  <!-- Orbit 2 -->
  <ellipse cx="100" cy="100" rx="85" ry="30"
    fill="none" stroke="#4fc3f7" stroke-width="2" opacity="0.8"
    transform="rotate(60, 100, 100)" filter="url(#glow)"/>

  <!-- Orbit 3 -->
  <ellipse cx="100" cy="100" rx="85" ry="30"
    fill="none" stroke="#4fc3f7" stroke-width="2" opacity="0.8"
    transform="rotate(120, 100, 100)" filter="url(#glow)"/>

  <!-- Nucleus -->
  <circle cx="100" cy="100" r="14" fill="url(#nucleusGrad)" filter="url(#glow)"/>

  <!-- Electrons -->
  <circle cx="185" cy="100" r="5" fill="#a8edea" filter="url(#glow)"/>
  <circle cx="57"  cy="126" r="5" fill="#a8edea" filter="url(#glow)"
    transform="rotate(60, 100, 100)"/>
  <circle cx="57"  cy="74"  r="5" fill="#a8edea" filter="url(#glow)"
    transform="rotate(120, 100, 100)"/>
</svg>
